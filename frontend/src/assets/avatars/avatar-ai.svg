<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- AI 机器人头像：芯片/机器人风格 -->
  <rect x="14" y="14" width="100" height="100" rx="20" fill="#1E293B"/>
  <rect x="30" y="30" width="68" height="48" rx="8" fill="#334155"/>
  <!-- 眼睛 -->
  <circle cx="50" cy="50" r="8" fill="#60A5FA"/>
  <circle cx="78" cy="50" r="8" fill="#60A5FA"/>
  <circle cx="50" cy="50" r="4" fill="#93C5FD"/>
  <circle cx="78" cy="50" r="4" fill="#93C5FD"/>
  <!-- 嘴巴 -->
  <rect x="46" y="66" width="36" height="4" rx="2" fill="#60A5FA"/>
  <!-- 天线 -->
  <line x1="64" y1="14" x2="64" y2="4" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
  <circle cx="64" cy="4" r="4" fill="#60A5FA"/>
  <!-- 芯片引脚 -->
  <line x1="30" y1="42" x2="20" y2="42" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="54" x2="20" y2="54" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="66" x2="20" y2="66" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
  <line x1="98" y1="42" x2="108" y2="42" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
  <line x1="98" y1="54" x2="108" y2="54" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
  <line x1="98" y1="66" x2="108" y2="66" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
  <!-- 耳朵 -->
  <rect x="8" y="40" width="10" height="28" rx="4" fill="#334155"/>
  <rect x="110" y="40" width="10" height="28" rx="4" fill="#334155"/>
</svg>
